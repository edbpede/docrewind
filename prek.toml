# Configuration file for `prek`, a git hook framework written in Rust.
# See https://prek.j178.dev for more information.
#:schema https://www.schemastore.org/prek.json

[[repos]]
repo = "builtin"
hooks = [
  { id = "trailing-whitespace" },
  { id = "end-of-file-fixer" },
  { id = "mixed-line-ending", args = ["--fix=lf"] },
  { id = "check-merge-conflict" },
  { id = "check-case-conflict" },
  { id = "check-added-large-files", args = ["--maxkb=500"] },
  { id = "detect-private-key" },
  { id = "check-json", exclude = '^tsconfig\.json$' },
  { id = "check-toml" },
  { id = "check-yaml" },
  { id = "no-commit-to-branch", args = ["--branch", "main"] },
]

# Conventional Commits — see CONTRIBUTING.md "Commit Messages".
[[repos]]
repo = "https://github.com/compilerla/conventional-pre-commit"
rev = "v4.4.0"
hooks = [
  { id = "conventional-pre-commit", stages = ["commit-msg"] },
]

# Secret / credential leak guard — fixtures and dotfiles must never carry tokens.
[[repos]]
repo = "https://github.com/gitleaks/gitleaks"
rev = "v8.30.1"
hooks = [
  { id = "gitleaks" },
]

# ============================================================
# PROJECT-LOCAL HOOKS — Bun only. Wired to real package.json scripts.
# Confirmed against package.json: `check`, `compile`, `test:run`, `test:logic` exist.
#   - biome-check / tsc-compile / check-pure-core run at PRE-COMMIT -> green gate
#   - vitest / bun-logic-tests run at PRE-PUSH
# (Optional `bun run build` pre-push gate deferred to Phase 7 — CI covers it.)
# ============================================================
[[repos]]
repo = "local"
hooks = [
  # Biome format + lint + import-organize in one pass (writes fixes).
  { id = "biome-check", name = "Biome check (write)", language = "system",
    entry = "bun run check", types = ["text"], pass_filenames = false },
  # TypeScript type-check only (noEmit). Runs on commit.
  { id = "tsc-compile", name = "TypeScript type-check", language = "system",
    entry = "bun run compile", files = '\.(ts|tsx)$', pass_filenames = false },
  # Pure-core purity guard — fails if #imports/browser.*/wxt leak into the six
  # pure dirs (decoder/reconstruction/timeline/domain/protocol/fixtures). Durable into Phase 4.
  { id = "check-pure-core", name = "Pure-core purity guard", language = "system",
    entry = "bash scripts/check-pure-core.sh", pass_filenames = false },
  # PR-reviewer recipes must stay tool-less (extensions: []). Goose's `developer`
  # shell is on by default; an omitted extensions field re-enables it, a
  # prompt-injection RCE risk on pull_request_target and the cause of the
  # "maximum number of actions" stall. Runs when a reviewer recipe changes.
  { id = "check-pr-review-recipes", name = "PR-review recipes tool-less guard", language = "system",
    entry = "bash scripts/check-pr-review-recipes.sh", files = '^\.goose/recipe\..*\.yaml$', pass_filenames = false },
  # Vitest (Solid/storage/browser-API). Heavier — restrict to pre-push.
  { id = "vitest", name = "Vitest unit/component", language = "system",
    entry = "bun run test:run", stages = ["pre-push"], pass_filenames = false },
  # Pure-logic Bun tests (decoder/reconstruction/timeline/domain). Pre-push.
  { id = "bun-logic-tests", name = "Bun pure-logic tests", language = "system",
    entry = "bun run test:logic", stages = ["pre-push"], pass_filenames = false },
]
