# AI PR Review — low-noise inline reviewer (Goose + NanoGPT, two-lane + synthesizer).
#
# SECURITY: runs on pull_request_target so it can post on forked PRs with the
# base-repo token + secrets. It therefore must NEVER execute untrusted PR code.
# The PR head is NEVER checked out: this job checks out the BASE repo (trusted)
# and treats the PR purely as DATA, fetched via the `gh pr diff` API call. The
# scripts and recipes that run come from the base tree, so a fork cannot swap them
# to exfiltrate secrets. Do not add any run-step that invokes a package manager
# or build tool, and do not check out `pull_request.head` —
# scripts/check-pr-review-workflow.sh fails CI on either. The review is
# COMMENT-only and can never gate a merge.
#
# EGRESS: review.sh additionally uploads the reviewer transcript (per-lane
# findings + verdict trace) to a client-side-encrypted PrivateBin paste and links
# it from the posted review. This is the only outbound data beyond the review
# itself; it contains only model findings about an already-public PR diff (never
# secrets, never the diff), the paste is link-gated (decryption key in the URL
# fragment), and the upload is best-effort — a failure never blocks the review.
name: AI PR Review

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: read # read the diff
  pull-requests: write # post the review

concurrency: # one review per PR; cancel superseded runs (rerun dedup)
  group: ai-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout BASE repo (trusted; PR head is never checked out or executed)
        uses: actions/checkout@v4
        # No `ref:` — for pull_request_target this checks out the base commit, i.e.
        # the trusted scripts/recipe. The untrusted PR is read as data via gh below.

      - name: Install Goose CLI
        run: |
          curl -fsSL https://github.com/block/goose/releases/download/stable/download_cli.sh \
            | CONFIGURE=false GOOSE_BIN_DIR="$HOME/.local/bin" bash
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install privatebin CLI (transcript paste; always latest)
        # Intentionally tracks the latest gearnode/privatebin release (the
        # /releases/latest/download/ redirect) rather than a pinned + checksummed
        # version — the operator accepts that supply-chain tradeoff. Still
        # curl/tar/install only (no package manager), so the pull_request_target
        # workflow guard stays green, and the upload remains best-effort: a bad
        # binary at worst yields "no link", never an RCE path into the verdict.
        run: |
          mkdir -p "$HOME/.local/bin"
          url="https://github.com/gearnode/privatebin/releases/latest/download/privatebin_Linux_x86_64.tar.gz"
          curl -fsSL -o /tmp/privatebin.tar.gz "$url"
          tar -xzf /tmp/privatebin.tar.gz -C /tmp privatebin
          install -m 0755 /tmp/privatebin "$HOME/.local/bin/privatebin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Gather diff (diff-only; PR title/body are NOT fed to the model)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
        run: gh pr diff "$PR" --repo "$GITHUB_REPOSITORY" > diff.patch

      - name: Run review (Goose + NanoGPT, two lanes + synthesizer, single COMMENT)
        env:
          GOOSE_PROVIDER: openai
          OPENAI_API_KEY: ${{ secrets.NANOGPT_API_KEY }}
          OPENAI_HOST: https://nano-gpt.com/api
          # Turn budget for Goose's structured-output "final output" tool loop,
          # which needs >1 turn for a :thinking model (a budget of 1 stalled every
          # tier with "maximum number of actions"). scripts/review.sh reads this
          # and passes it via `--max-turns` — the only lever that works, since
          # `goose run` ignores a recipe-level settings.max_turns. Tool-less
          # recipes (extensions: []) keep these turns harmless.
          GOOSE_MAX_TURNS: "5"
          PR: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Reviewer-transcript paste (best-effort). TRANSCRIPT_ENABLED defaults to
          # 1 in review.sh; the config points at the zbin.io PrivateBin instance
          # with 1-year retention and a markdown formatter. A missing CLI/config or
          # a failed upload degrades to a local recap with no link — never blocks.
          PRIVATEBIN_CONFIG: .github/privatebin.json
        run: bash scripts/review.sh
