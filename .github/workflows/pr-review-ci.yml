# SPDX-License-Identifier: AGPL-3.0-or-later
#
# CI gate for the PR-reviewer tooling (plan §5/§13). Runs the deterministic unit
# tests, the typecheck, Biome, and the schema/recipe DRIFT GATE: regenerating the
# loose+strict schemas and the Goose recipe must leave the tree unchanged, so the
# recipe, validator, and NanoGPT-direct path can never silently diverge from the
# canonical base. Scoped to the tooling paths so it does not run on unrelated PRs.
name: PR Review tooling CI

on:
  pull_request:
    paths:
      - "scripts/pr-review/**"
      - "schema/**"
      - "prompt/**"
      - ".goose/**"
      - ".github/workflows/pr-review-*.yml"
  push:
    branches: [main]
    paths:
      - "scripts/pr-review/**"
      - "schema/**"
      - "prompt/**"
      - ".goose/**"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@v2 # SECURITY: pin to a full commit SHA before enabling on a public repo
        with:
          bun-version: "1.3.14"
      - run: bun install --frozen-lockfile
      - name: Typecheck
        run: bun run compile
      - name: Biome
        run: bunx biome check .
      - name: Unit tests
        run: bun run test:pr-review
      - name: Schema + recipe drift gate
        run: |
          bun run schemas:build
          git diff --exit-code schema .goose
