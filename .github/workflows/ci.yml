# SPDX-License-Identifier: AGPL-3.0-or-later
#
# CI. The `test` job runs Phase 6's three-tier test split + coverage gate +
# network-isolation audit. The sibling `packaging-smoke` job (Phase 7) runs the
# built-artifact manifest audit + same-environment determinism gate on the zipped
# extensions, and uploads those zips as a downloadable `extension-zips` artifact
# for review convenience. Packaging stays OUT of the `test` job by design; the
# full tag-triggered release build (provenance + checksums + signed/uploaded
# release assets) lives in release.yml — this file does not recreate it.
name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: compile · check · test (logic/coverage/vitest) · build · e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # Pin Bun to the version the project targets (.augment/rules + @types/bun).
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Generate .wxt/ types so tsc + the build resolve WXT aliases.
      - name: Prepare WXT
        run: bun run postinstall

      - name: Typecheck
        run: bun run compile

      # Non-writing lint/format in CI (the local `check` uses --write).
      - name: Lint & format check
        run: bunx biome ci .

      # Pure-core purity guard (mirrors prek `check-pure-core` pre-commit hook):
      # fails if #imports/browser.*/wxt leak into the six pure dirs
      # (decoder/reconstruction/timeline/domain/protocol/fixtures).
      - name: Pure-core purity guard
        run: bash scripts/check-pure-core.sh

      # Static network-isolation guard (Phase 6 WI-5 / PRD §17): defense-in-depth
      # static lint complementing the runtime e2e audit. Exits non-zero if any
      # source line names a non-Google network target; CI gates on that exit code.
      - name: Network-isolation static guard
        run: bash scripts/check-no-foreign-hosts.sh

      # Coverage-gate disjointness guard (Decision D1): asserts no dir gated by
      # test:coverage is also in bunfig.toml's coveragePathIgnorePatterns, which
      # would make the per-file floor vacuous. Catches the one silent-drift mode;
      # see scripts/check-coverage-gate-disjoint.sh for why complement-equality
      # is NOT the right invariant. Exits non-zero on overlap; CI gates on it.
      - name: Coverage-gate disjointness guard
        run: bash scripts/check-coverage-gate-disjoint.sh

      - name: Pure-logic tests (Bun)
        run: bun run test:logic

      # Coverage gate (Decision D1): >=85% line/function on decoder+reconstruction.
      # Bun reads the threshold from bunfig.toml [test]; a real miss exits non-zero.
      - name: Coverage gate (decoder/reconstruction)
        run: bun run test:coverage

      - name: Component/storage tests (Vitest)
        run: bun run test:run

      - name: Build Chrome MV3 extension
        run: bun run build

      # Channel parity: e2e/fixtures.ts pins `channel: "chromium"`; this provisions
      # exactly that Playwright-bundled Chromium so local/CI behavior matches.
      - name: Install Playwright Chromium
        run: bunx playwright install --with-deps chromium

      # E2E incl. replay-smoke + network-isolation audit, against .output/chrome-mv3.
      - name: E2E tests (Playwright, Chromium)
        run: bun run test:e2e

  # Phase 7 packaging smoke — a SIBLING job (deliberately not part of `test`):
  # builds + zips both browsers and re-asserts the privacy invariant on the
  # SHIPPED bytes plus same-environment per-file build determinism. The full
  # release build (provenance + checksums + artifact upload) is release.yml.
  packaging-smoke:
    name: packaging-smoke (verify-manifest · determinism)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Prepare WXT
        run: bun run postinstall

      # Build + package both browsers from the one codebase.
      - name: Build & zip both browsers
        run: bun run build && bun run zip && bun run build:firefox && bun run zip:firefox

      # Surface the smoke-built zips as a downloadable CI artifact (Chromium +
      # Firefox + the Firefox sources bundle). This is a convenience for review;
      # the authoritative, provenance-signed + checksummed release artifacts are
      # still produced only by the tag-triggered release.yml.
      - name: Upload packaged extensions
        uses: actions/upload-artifact@v4
        with:
          name: extension-zips
          path: .output/*.zip
          if-no-files-found: error
          retention-days: 14
          # WXT writes to .output/ — a dot-prefixed dir that upload-artifact@v4
          # treats as hidden and skips by default, yielding a spurious
          # "No files were found" failure. Opt the zips back in.
          include-hidden-files: true

      # Permission/identity/no-remote-code audit on the zipped artifacts.
      - name: Verify built manifests
        run: bash scripts/verify-manifest.sh

      # Firefox static lint (web-ext). This is CI-able; the live web-ext run/load
      # on docs.google.com is a manual release gate.
      - name: Firefox static lint (web-ext)
        run: bun run lint:firefox

      # Same-environment per-file content determinism (builds twice; see script header).
      - name: Verify build determinism
        run: bash scripts/verify-reproducible-build.sh
