# SPDX-License-Identifier: AGPL-3.0-or-later
#
# Automated PR review (plan §12). This is the repo's first GitHub Actions
# workflow. It runs the in-repo Bun CLI (tools/pr-review) which fetches the diff
# via the GitHub API, sends text to NanoGPT, and posts ONE grouped COMMENT review.
#
# Why pull_request_target is the correct, non-dangerous choice here: the bot is
# API-only. It NEVER checks out or executes PR-head code — `actions/checkout`
# below takes the trusted BASE branch (the default ref for pull_request_target),
# never the fork head. The workflow YAML itself is always read from the base
# branch, so a fork cannot modify it. Secrets are only ever used to call NanoGPT
# with diff TEXT. The residual attack surface is prompt injection, handled in the
# CLI by untrusted-content delimiting + strict schema/Zod validation + COMMENT-only
# reviews that can never approve or merge.

name: AI PR Review

on:
  # A. Automatic on every PR (including forks). Drafts are skipped in the job `if`.
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review, labeled]
  # C. On-demand `/review` comment command (author-association gated below).
  issue_comment:
    types: [created]
  # D. Manual / dry-run entry.
  workflow_dispatch:
    inputs:
      pr_number:
        description: PR number to review
        required: true
        type: string
      dry_run:
        description: Print the sanitized payload without posting
        required: false
        type: boolean
        default: true

# Top-level least-privilege: every unlisted scope defaults to none. A job-level
# block would NOT shrink the default read-write GITHUB_TOKEN on pull_request_target.
permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ai-review-${{ github.event.pull_request.number || github.event.issue.number || inputs.pr_number }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    # A: automatic, non-draft, non-label events.
    # B: label-triggered re-review (works on drafts) when the label is `ai-review`.
    # C: `/review` comment on a PR by an allowed association.
    # D: manual dispatch.
    if: >
      (github.event_name == 'pull_request_target' && github.event.action != 'labeled' && github.event.pull_request.draft == false) ||
      (github.event_name == 'pull_request_target' && github.event.action == 'labeled' && github.event.label.name == 'ai-review') ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request != null && startsWith(github.event.comment.body, '/review') && contains(fromJson('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)) ||
      (github.event_name == 'workflow_dispatch')
    steps:
      # Checks out the trusted BASE branch (default ref), NOT the PR head. This is
      # what we need to run tools/pr-review; the PR head is never executed.
      - name: Checkout base
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          # Explicit trusted base ref — defense-in-depth so the "never PR head"
          # guarantee never relies on checkout's default-ref behavior.
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Run PR review
        continue-on-error: true # a bot failure must never block the PR (§14)
        env:
          NANOGPT_API_KEY: ${{ secrets.NANOGPT_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number || inputs.pr_number }}
          REVIEW_DRY_RUN: ${{ (github.event_name == 'workflow_dispatch' && inputs.dry_run) || '' }}
        run: bun run tools/pr-review/main.ts
