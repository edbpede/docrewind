# SPDX-License-Identifier: AGPL-3.0-or-later
#
# Stage 1 — PR Review (collect). Runs in the UNTRUSTED PR/fork context with NO
# secrets and a read-only token (plan §11, C1). It gathers PR context purely via
# `gh api` — there is deliberately NO actions/checkout, so the untrusted head /
# merge tree is never placed on disk in this job — and uploads the result as a
# data-only artifact for Stage 2 (workflow_run) to consume.
#
# This workflow is intentionally conservative. It is safe to run on fork PRs
# because it can reach neither the NanoGPT key nor a write token.
name: PR Review (collect)

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read

# Debounce rapid synchronize pushes: a newer push cancels the in-flight collect
# (M-D). Stage 2 (workflow_run) deliberately does NOT cancel-in-progress.
concurrency:
  group: pr-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  collect:
    runs-on: ubuntu-latest
    # Skip drafts (configurable). No checkout step anywhere in this job.
    if: github.event.pull_request.draft == false
    steps:
      - uses: oven-sh/setup-bun@v2 # SECURITY: pin to a full commit SHA before enabling on a public repo
        with:
          bun-version: "1.3.14"
      # The collector scripts come from the artifact-less base image via a sparse
      # checkout of ONLY the scripts + lockfile — never the PR head. We fetch the
      # base ref explicitly (not the default merge ref).
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          persist-credentials: false
      - name: Install collector deps
        run: bun install --frozen-lockfile
      - name: Collect PR context
        env:
          # Read-only on fork PRs. No NANOGPT_API_KEY is present in this job.
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        # The collector is run from the TRUSTED base ref (never the PR head — see
        # the C1 guard in workflows.test.ts). On the bootstrap PR that first adds
        # the reviewer, scripts/pr-review does not yet exist on base, so there is
        # nothing to run: skip cleanly. Once this PR merges to the default branch,
        # base carries the scripts and collect activates for every later PR.
        run: |
          if [ ! -f scripts/pr-review/collect-pr-context.ts ]; then
            echo "::notice title=PR reviewer not yet on base::scripts/pr-review is absent from the base ref (${{ github.event.pull_request.base.sha }}); the reviewer activates once this PR is merged to the default branch. Skipping collect."
            exit 0
          fi
          bun run scripts/pr-review/collect-pr-context.ts
      - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: pr-review-context
          if-no-files-found: ignore # bootstrap PR produces no context — not an error
          path: |
            pr-context.json
            pr.diff
          retention-days: 1
