name: opencode

on:
  # Auto-review: run a review on every pull request.
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  # On-demand: comment "/oc" or "/opencode" on an issue or PR to spawn opencode.
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  opencode:
    # Run on every PR event, or when a comment starts with /oc or /opencode.
    if: |
      github.event_name == 'pull_request' ||
      startsWith(github.event.comment.body, '/oc') ||
      startsWith(github.event.comment.body, '/opencode')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: write
      issues: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Run opencode
        uses: anomalyco/opencode/github@latest
        env:
          NANOGPT_API_KEY: ${{ secrets.NANOGPT_API_KEY }}
        with:
          # provider/model -> opencode splits on the first "/": provider=nanogpt,
          # model key="minimax/minimax-m3:thinking" (matches opencode.json).
          model: "nanogpt/minimax/minimax-m3:thinking"
