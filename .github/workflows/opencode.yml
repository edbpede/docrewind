name: opencode

on:
  # Auto-review on PR events (drafts skipped in the job `if`), plus the
  # `opencode-review` label as a manual trigger that also works on draft PRs.
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, labeled]
  # On-demand: comment "/oc" or "/opencode" (e.g. "/oc review") on an issue or PR.
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write # create the inline review + comments
  issues: write # fallback summary comment + opencode-review/opencode-reviewed labels

# One review at a time per PR; a newer push lets the in-flight run finish first.
concurrency:
  group: opencode-review-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: false

jobs:
  review:
    # Three entry paths:
    #   (a) a non-labeled PR event on a NON-draft PR (auto-review),
    #   (b) a `labeled` event adding the `opencode-review` label (works on drafts),
    #   (c) a "/oc" or "/opencode" comment on an issue or PR.
    if: |
      (github.event_name == 'pull_request' && github.event.action != 'labeled'
         && github.event.pull_request.draft == false) ||
      (github.event_name == 'pull_request' && github.event.action == 'labeled'
         && github.event.label.name == 'opencode-review') ||
      (github.event_name != 'pull_request' &&
         (startsWith(github.event.comment.body, '/oc') ||
          startsWith(github.event.comment.body, '/opencode')))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Resolve PR context
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          case "$GITHUB_EVENT_NAME" in
            pull_request) N='${{ github.event.pull_request.number }}' ;;
            issue_comment) N='${{ github.event.issue.number }}' ;;
            pull_request_review_comment) N='${{ github.event.pull_request.number }}' ;;
            *) echo "Unsupported event: $GITHUB_EVENT_NAME" >&2; exit 1 ;;
          esac
          read -r SHA BASE < <(gh pr view "$N" --json headRefOid,baseRefName \
            --jq '[.headRefOid, .baseRefName] | @tsv')
          {
            echo "number=$N"
            echo "head_sha=$SHA"
            echo "base_ref=$BASE"
          } >> "$GITHUB_OUTPUT"
          echo "Resolved PR #$N head=$SHA base=$BASE"

      - name: Check out the PR head + base
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          BASE_REF: ${{ steps.pr.outputs.base_ref }}
        run: |
          set -euo pipefail
          gh pr checkout "$PR_NUMBER"
          git fetch --no-tags origin "$BASE_REF"

      - name: Install opencode
        run: |
          set -euo pipefail
          curl -fsSL https://opencode.ai/install | bash
          echo "$HOME/.opencode/bin" >> "$GITHUB_PATH"

      - name: Run opencode review (capture JSON)
        id: review
        continue-on-error: true
        env:
          NANOGPT_API_KEY: ${{ secrets.NANOGPT_API_KEY }}
          BASE_REF: ${{ steps.pr.outputs.base_ref }}
        run: |
          set -uo pipefail
          echo "gh: $(gh --version | head -1) | opencode: $(opencode --version || true)"
          opencode run \
            --agent review \
            --model "nanogpt/minimax/minimax-m3:thinking" \
            --format default \
            "Review the changes in this pull request — the diff between origin/${BASE_REF} and HEAD. Follow your system instructions exactly and output ONLY the JSON object." \
            > "$RUNNER_TEMP/opencode-raw.txt" 2> "$RUNNER_TEMP/opencode-err.txt"
          code=$?
          echo "opencode exit=$code"
          echo "--- stderr (tail) ---"; tail -n 20 "$RUNNER_TEMP/opencode-err.txt" || true
          echo "--- stdout (tail) ---"; tail -n 40 "$RUNNER_TEMP/opencode-raw.txt" || true
          exit $code

      - name: Upload raw model output (diagnostic)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: opencode-raw-output
          path: |
            ${{ runner.temp }}/opencode-raw.txt
            ${{ runner.temp }}/opencode-err.txt
          if-no-files-found: warn
          retention-days: 7

      - name: Post inline review
        if: always() && steps.review.outcome == 'success'
        uses: actions/github-script@v7
        env:
          RAW_FILE: ${{ runner.temp }}/opencode-raw.txt
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          HEAD_SHA: ${{ steps.pr.outputs.head_sha }}
        with:
          script: |
            const fs = require("fs");
            const { owner, repo } = context.repo;
            const pull_number = Number(process.env.PR_NUMBER);
            const commit_id = process.env.HEAD_SHA;

            const raw = fs.readFileSync(process.env.RAW_FILE, "utf8");

            // Extract the JSON object: prefer a ```json fence, then any fence, else raw.
            function extractJson(text) {
              const j = [...text.matchAll(/```json\s*([\s\S]*?)```/gi)];
              if (j.length) return j[j.length - 1][1];
              const any = [...text.matchAll(/```\s*([\s\S]*?)```/g)];
              if (any.length) return any[any.length - 1][1];
              const s = text.indexOf("{"), e = text.lastIndexOf("}");
              return s !== -1 && e > s ? text.slice(s, e + 1) : text;
            }

            let data;
            try {
              data = JSON.parse(extractJson(raw).trim());
            } catch (err) {
              core.warning(`Could not parse model output as JSON: ${err.message}`);
              await github.rest.issues.createComment({
                owner, repo, issue_number: pull_number,
                body: "Automated opencode review ran but its output could not be parsed into structured comments. See the `opencode-raw-output` workflow artifact.",
              });
              return;
            }

            const footer =
              "\n\n---\n*Automated review complete. React with 👍 or 👎 on individual comments to give feedback.*";
            const items = Array.isArray(data.comments) ? data.comments : [];
            const comments = items.map((c) => {
              let body = String(c.body || "");
              if (c.suggestion) body += "\n\n```suggestion\n" + c.suggestion + "\n```";
              const o = { path: c.path, line: Number(c.line), side: c.side || "RIGHT", body };
              if (c.start_line) { o.start_line = Number(c.start_line); o.start_side = c.start_side || o.side; }
              return o;
            });
            const summary = String(data.summary || "Review completed.") + (comments.length ? footer : "");

            try {
              await github.rest.pulls.createReview({
                owner, repo, pull_number, commit_id, event: "COMMENT", body: summary, comments,
              });
              core.info(`Posted one review with ${comments.length} inline comment(s).`);
            } catch (err) {
              core.warning(`Batched review failed (${err.message}); posting comments individually.`);
              let posted = 0;
              for (const c of comments) {
                try {
                  await github.rest.pulls.createReviewComment({
                    owner, repo, pull_number, commit_id,
                    path: c.path, line: c.line, side: c.side, body: c.body,
                    ...(c.start_line ? { start_line: c.start_line, start_side: c.start_side } : {}),
                  });
                  posted++;
                } catch (e2) {
                  core.warning(`Skipped ${c.path}:${c.line} — ${e2.message}`);
                }
              }
              await github.rest.issues.createComment({ owner, repo, issue_number: pull_number, body: summary });
              core.info(`Posted ${posted}/${comments.length} inline comment(s) individually.`);
            }

      - name: Notify on failure
        if: steps.review.outcome == 'failure'
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number(process.env.PR_NUMBER),
              body: "Automated opencode review failed before producing output; see the workflow logs and the `opencode-raw-output` artifact.",
            });

      - name: Clean up review label
        # After a label-triggered run, remove `opencode-review` and mark it reviewed.
        if: github.event_name == 'pull_request' && github.event.action == 'labeled'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const common = {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number("${{ steps.pr.outputs.number }}"),
            };
            try {
              await github.rest.issues.removeLabel({ ...common, name: "opencode-review" });
            } catch (e) {
              core.info(`Could not remove 'opencode-review' label: ${e.message}`);
            }
            try {
              await github.rest.issues.addLabels({ ...common, labels: ["opencode-reviewed"] });
            } catch (e) {
              core.info(`Could not add 'opencode-reviewed' label: ${e.message}`);
            }
