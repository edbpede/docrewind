name: opencode

on:
  # Auto-review on PR events (drafts are skipped in the job `if` below), plus the
  # `opencode-review` label as a manual trigger that also works on draft PRs.
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, labeled]
  # On-demand: comment "/oc" or "/opencode" (e.g. "/oc review") on an issue or PR.
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  id-token: write
  contents: read
  pull-requests: write # required to post inline review comments via gh api
  issues: write # failure-notice comment + opencode-review/opencode-reviewed labels use the Issues API

jobs:
  review:
    # Three entry paths:
    #   (a) a non-labeled PR event on a NON-draft PR (auto-review),
    #   (b) a `labeled` event adding the `opencode-review` label (works on drafts),
    #   (c) a "/oc" or "/opencode" comment on an issue or PR.
    if: |
      (github.event_name == 'pull_request' && github.event.action != 'labeled'
         && github.event.pull_request.draft == false) ||
      (github.event_name == 'pull_request' && github.event.action == 'labeled'
         && github.event.label.name == 'opencode-review') ||
      (github.event_name != 'pull_request' &&
         (startsWith(github.event.comment.body, '/oc') ||
          startsWith(github.event.comment.body, '/opencode')))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Run opencode review
        id: review
        uses: anomalyco/opencode/github@latest
        env:
          NANOGPT_API_KEY: ${{ secrets.NANOGPT_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # provider/model -> opencode splits on the first "/": provider=nanogpt,
          # model key="minimax/minimax-m3:thinking" (matches opencode.json).
          model: "nanogpt/minimax/minimax-m3:thinking"
          # Use the read-only `review` agent defined in opencode.json. If this ever
          # fails to drive the review, replace `agent:` with a `prompt:` input that
          # inlines .github/opencode/review-prompt.md (Option B in the plan).
          agent: review
          # Give the agent a GITHUB_TOKEN so `gh` can post the inline review.
          use_github_token: true
        continue-on-error: true

      - name: Notify on failure
        if: steps.review.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: "Automated opencode review failed; see the workflow logs for details.",
            });

      - name: Clean up review label
        # After a label-triggered run, remove `opencode-review` and mark it reviewed.
        # Guarded so it never runs (or fails) on the auto / comment paths.
        if: github.event_name == 'pull_request' && github.event.action == 'labeled'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const common = {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            };
            try {
              await github.rest.issues.removeLabel({ ...common, name: "opencode-review" });
            } catch (e) {
              core.info(`Could not remove 'opencode-review' label: ${e.message}`);
            }
            try {
              await github.rest.issues.addLabels({ ...common, labels: ["opencode-reviewed"] });
            } catch (e) {
              core.info(`Could not add 'opencode-reviewed' label: ${e.message}`);
            }
