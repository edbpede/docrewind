# SPDX-License-Identifier: AGPL-3.0-or-later
#
# OPTIONAL single-stage variant for INTERNAL-ONLY repos (plan §11). It collects,
# runs Goose, validates, and posts in one `pull_request`-triggered job. This is
# simpler to operate but is ONLY safe when fork PRs are impossible (e.g. a
# private repo, or external contributors cannot open PRs) — because a
# `pull_request` job for a same-repo PR has secrets + write available, which a
# fork PR must never get.
#
# OFF BY DEFAULT: it triggers only on manual workflow_dispatch. To enable for an
# internal repo, uncomment the `pull_request` trigger AND confirm fork PRs are
# impossible. Do NOT enable this on a public repo that accepts fork PRs — use the
# two-stage pr-review-collect.yml + pr-review-post.yml instead.
name: PR Review (internal single-stage)

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to review"
        required: true
  # DANGER: only uncomment on a repo where fork PRs are impossible.
  # pull_request:
  #   types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: pr-review-internal-${{ github.event.inputs.pr_number || github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@v2 # SECURITY: pin to a full commit SHA before enabling on a public repo
        with:
          bun-version: "1.3.14"
      - name: Install deps + Goose
        run: |
          bun install --frozen-lockfile
          # SECURITY: pin the Goose release tag to an immutable version before enabling.
          curl -fsSL "https://github.com/block/goose/releases/download/stable/download_cli.sh" | bash
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Collect PR context
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.inputs.pr_number || github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: bun run scripts/pr-review/collect-pr-context.ts
      - name: Run Goose review (tiered fallback)
        env:
          GOOSE_PROVIDER: openai
          OPENAI_HOST: https://nano-gpt.com
          OPENAI_BASE_PATH: api/v1/chat/completions
          OPENAI_API_KEY: ${{ secrets.NANOGPT_API_KEY }}
          OPENAI_TIMEOUT: "240"
          GOOSE_MODE: auto
          GOOSE_CLI_SHOW_THINKING: "false"
          GOOSE_CLI_MIN_PRIORITY: "0.5"
          GOOSE_DISABLE_SESSION_NAMING: "true"
        run: bun run scripts/pr-review/run-goose-review.ts
      - name: Validate + anchor
        run: bun run scripts/pr-review/validate-review-output.ts
      # Internal variant: the collected head SHA is trusted (same-repo PR), so we
      # synthesize identity.json directly from the collected context.
      - name: Synthesize identity (internal, same-repo trust)
        run: |
          bun -e "const c=require('./pr-context.json');require('fs').writeFileSync('identity.json',JSON.stringify({pull_number:c.pull_number,head_sha:c.diffed_sha,repo:c.repo},null,2))"
      - name: Post review
        env:
          GH_TOKEN: ${{ github.token }}
        run: bun run scripts/pr-review/post-github-review.ts
        continue-on-error: true
